repos:
  - repo: local
    hooks:
      - id: pre-commit-check
        name: Consolidated pre-commit checks
        entry: python scripts/pre-commit-check.py --staged
        language: system
        pass_filenames: false
        always_run: true

      - id: commit-msg
        name: Conventional Commits
        description: Validate commit message follows Conventional Commits format
        entry: python scripts/commit-msg.py
        language: system
        stages: [commit-msg]
