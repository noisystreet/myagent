repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        args: ["--skip=*.pyc,./.git,./.env"]

  - repo: https://github.com/terryyin/lizard
    rev: v1.17.10
    hooks:
      - id: lizard
        args: [
          "-C", "10",
          "-L", "150",
          "--warnings_only",
          "-l", "python",
          "--exclude", "tests/*",
        ]

  - repo: local
    hooks:
      - id: commit-msg
        name: Conventional Commits
        description: Validate commit message follows Conventional Commits format
        entry: python scripts/commit-msg.py
        language: system
        stages: [commit-msg]
