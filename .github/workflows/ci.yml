name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR/branch to save Actions quota
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://pypi.org/simple/ -r requirements.txt
          pip install --index-url https://pypi.org/simple/ -e .

      - name: Lint with ruff
        run: |
          ruff check src/

      - name: Check formatting
        run: |
          ruff format --check src/

      - name: Check complexity with lizard
        run: |
          lizard -C 10 -L 150 --warnings_only -l python src/

      - name: Audit dependencies for vulnerabilities
        run: |
          pip-audit

      - name: Test with coverage gate
        run: |
          pytest tests/ -v --cov=src --cov-report=term --cov-fail-under=35
