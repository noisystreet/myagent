version: 2
updates:
  # Python (pip) dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    # Group minor and patch updates together to reduce PR noise
    groups:
      minor-and-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    # Labels applied to all Dependabot PRs
    labels:
      - "dependencies"
      - "automated"
    # Maximum number of open Dependabot PRs at any time
    open-pull-requests-limit: 10
    # Auto-approve and auto-merge for patch updates only
    allow:
      - dependency-type: "direct"
        update-type: "version-update:semver-patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    labels:
      - "dependencies"
      - "ci"
